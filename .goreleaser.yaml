# Documentation at https://goreleaser.com

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

builds:
  - id: grafanapi
    binary: grafanapi
    main: ./cmd/grafanapi

    # darwin/arm64 only: the Keychain credential store (internal/keychain/keychain_darwin.go)
    # is cgo against Security.framework, so this cannot be cross-compiled.
    goos:
      - darwin
    goarch:
      - arm64

    env:
      - CGO_ENABLED=1

    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: grafanapi
    ids: [grafanapi]
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next-{{ .ShortCommit }}"

changelog:
  use: github
  sort: '' # use the output of `git log` as is
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^tests:'
      - '^chore:'
      - '^Merge pull request'

homebrew_casks:
  - repository:
      owner: avitsrimer
      name: homebrew-apps
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/avitsrimer/grafanapi"
    description: "grafanapi: a session-cookie-authenticated CLI for managing Grafana resources"
    # the binary is unsigned/ad-hoc, so a downloaded cask is Gatekeeper-quarantined;
    # strip the quarantine attribute on install so `grafanapi` runs without a manual xattr call.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/grafanapi"]
          end
