name: CI
on:
  pull_request: ~
  push:
    branches: [main] # so that we build a Go cache that can be re-used in PRs

env:
  DEVBOX_VERSION: 0.16.0

permissions:
  contents: read

jobs:
  linters:
    name: Linters
    # grafanapi is macOS-only: the Keychain credential store (internal/keychain) is cgo against
    # Security.framework and everything that depends on it (internal/config, cmd/grafanapi/login,
    # cmd/grafanapi/config, ...) only builds on darwin, so linting needs a darwin runner.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore go vendors
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 #v5.0.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-deps-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-deps-${{ runner.os }}

      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 #v0.14.0
        with:
          enable-cache: 'true'
          devbox-version: ${{ env.DEVBOX_VERSION }}

      - name: Run golangci-lint
        run: make lint

      - name: Validate GoReleaser configuration
        run: devbox run goreleaser check

  tests:
    name: Tests
    # See the comment on the linters job above: the whole module is darwin-only now, so tests
    # need a darwin runner too.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Restore go vendors
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 #5.0.3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-deps-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            go-deps-${{ runner.os }}

      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 #v0.14.0
        with:
          enable-cache: 'true'
          devbox-version: ${{ env.DEVBOX_VERSION }}

      - name: Tests
        run: make tests

      # internal/keychain wraps cgo Security.framework calls in a timeout goroutine
      # (keychain_darwin.go's withTimeout); run that package under the race detector to catch
      # concurrency bugs the plain "make tests" run above wouldn't.
      - name: Keychain tests (race)
        run: devbox run go test -v -race ./internal/keychain/...

  docs:
    name: Documentation
    # docs/reference generation runs the CLI's Cobra command tree (scripts/cmd-reference), which
    # transitively imports the darwin-only internal/keychain package, so this needs a darwin
    # runner too.
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@a0d2d53632934ae004f878c840055956d9f741b0 #v0.14.0
        with:
          enable-cache: 'true'
          devbox-version: ${{ env.DEVBOX_VERSION }}

      - name: Check for drift in the generated documentation references
        run: make cli-reference
        shell: bash

      - name: Build documentation
        run: make docs
