name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

# Allow only one concurrent release, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow them to complete.
concurrency:
  group: "releases"
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write # to create the GitHub release
    name: Release
    # macOS runner required: the Keychain credential store (internal/keychain/keychain_darwin.go)
    # is cgo against Security.framework, so the darwin/arm64 binary must be built natively.
    #
    # This job uses actions/setup-go (system Go toolchain) rather than devbox: devbox's nix-pinned
    # macOS SDK lacks the SecTrustCopyCertificateChain symbol (macOS 12+ Security.framework), which
    # breaks the cgo link of crypto/x509 on darwin. The keychain-darwin job in ci.yaml already
    # proves this combination builds and tests cleanly with the system toolchain.
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
