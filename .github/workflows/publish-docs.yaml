name: Publish documentation
on:
  workflow_dispatch: ~
  # GoReleaser (release.yaml) creates and publishes the GitHub release for `v*` tags; ship the
  # matching documentation build once that release goes live.
  release:
    types: [published]

permissions:
  contents: read

# Allow only one concurrent release, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow them to complete.
concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  build_docs:
    name: Build
    # docs/reference generation runs the CLI's Cobra command tree (scripts/cmd-reference), which
    # transitively imports the darwin-only internal/keychain package, so this needs a darwin
    # runner, and actions/setup-go rather than devbox so the cgo link succeeds (see the
    # `docs` job in ci.yaml for the full explanation). mkdocs itself has nothing to do with
    # Go/cgo, so it's installed directly via pip instead of pulling in devbox just for that
    # one step.
    runs-on: macos-latest

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'

      - name: Install mkdocs
        run: pip install -qq -r requirements.txt

      - name: Build documentation
        run: |
          rm -rf ./docs/reference/cli ./docs/reference/environment-variables ./docs/reference/configuration
          go run scripts/cmd-reference/*.go "./docs/reference/cli"
          go run scripts/env-vars-reference/*.go "./docs/reference/environment-variables"
          go run scripts/config-reference/*.go "./docs/reference/configuration"
          mkdocs build -f mkdocs.yml -d ./build/documentation

      - name: Upload pages artifact
        id: deployment
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b #v4.0.0
        with:
          path: ./build/documentation

  publish_documentation:
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    needs: build_docs

    name: Publish
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e #v4.0.5
